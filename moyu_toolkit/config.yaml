api:
  api_key: your-api-key-here
  base_url: https://api.openai.com/v1
  chat_model: gpt-4o-mini
  embedding_model: text-embedding-3-small
  provider: openai
compression:
  auto_threshold: 0.85
  budget_chars: 2000
  enabled: true
  mild_threshold: 0.7
forgetting_curve:
  archive_days: 60
  demote_days: 14
  density_window: 20
  enabled: true
  scene_protection_days: 7
  # User-defined scene labels (optional). Format:
  #   scene_labels:
  #     SceneName1: [keyword1, keyword2, keyword3]
  #     SceneName2: [keyword4, keyword5]
  # A memory is assigned to a scene if its summary matches any keyword.
  # These take priority over auto-extracted keyword scenes.
  # auto_scene_extraction: Enable/disable automatic keyword-based scene extraction (default: false)
  # min_keyword_length: Minimum character length for auto-extracted scene keywords
  min_keyword_length: 3
learner:
  correction_signals:
  - 不是
  - 不对
  - 错了
  - 应该是
  - 不要
  - 记住
  - 我告诉过你
  - 我说过
  - 别
  - 别再
  - 你又
  - 还说
  - 'no'
  - wrong
  - don't
  - stop
  - hey
  - remember
  - i told you
  - not
  - never
  - hold on
  - wait
  - actually
  - correction
  enabled: true
memory:
  storage_path: ./memory_data
  weights:
    keyword: 0.3
    recency: 0.2
    semantic: 0.5
security:
  lockout_minutes: 30
  lockout_threshold: 3

# Alert configuration (for tamper detection notifications)
# channel: none | feishu | webhook | email
# feishu_webhook: paste your Feishu bot webhook URL here
# webhook_url: custom HTTP endpoint
# email_to: requires SMTP setup (not yet implemented)
alert:
  channel: none
  feishu_webhook: ""
  webhook_url: ""
  email_to: ""
