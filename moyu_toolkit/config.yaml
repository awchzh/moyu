# MOYU Configuration
# Copy this file to config.yaml and fill in your API info

memory:
  # Memory data storage path
  storage_path: "./memory_data"
  
  # TEMPR retrieval weights (sum doesn't need to be 1, will be auto-normalized)
  weights:
    semantic: 0.5
    keyword: 0.3
    recency: 0.2

api:
  # LLM API configuration (for embedding and knowledge graph extraction)
  # Supports all OpenAI-compatible formats
  provider: "openai"  # or deepseek, minimax, doubao, etc.
  api_key: "your-api-key-here"
  base_url: "https://api.openai.com/v1"
  embedding_model: "text-embedding-3-small"
  chat_model: "gpt-4o-mini"

learner:
  # Learner signal module configuration
  enabled: true
  # Trigger word list (modify per speaking habits. Leave empty to use built-in defaults)
  correction_signals:
    - "不是"
    - "不对"
    - "错了"
    - "应该是"
    - "不要"
    - "记住"
    - "我告诉过你"
    - "我说过"
    - "别"
    - "别再"
    - "你又"
    - "还说"
    # English
    - "no"
    - "wrong"
    - "don't"
    - "stop"
    - "hey"
    - "remember"
    - "i told you"
    - "not"
    - "never"
    - "hold on"
    - "wait"
    - "actually"
    - "correction"

security:
  # Security module configuration
  # Auto-generated after first run of `python3 security.py setup` to set password
  # safe_word_hash: ""  # SHA256 hash, plaintext not stored
  lockout_threshold: 3   # Lock after this many consecutive failures
  lockout_minutes: 30    # Lockout duration in minutes
